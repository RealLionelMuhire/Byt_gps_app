services:
  # GPS Tracking Server
  # Uses Neon serverless DB — no local postgres service needed.
  # All secrets are loaded from the .env file in this directory.
  gps_server:
    build: .
    container_name: gps_tracking_server
    env_file:
      - .env             # Loads DATABASE_URL, CLERK_*, ADMIN_*, etc.
    environment:
      # These can be overridden here if needed, but .env takes precedence for secrets.
      HOST: 0.0.0.0
      HTTP_PORT: 8000
      TCP_PORT: 7018
    ports:
      - "8001:8000"  # HTTP API  →  http://localhost:8001
      - "7018:7018"  # TCP for GPS trackers
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    restart: unless-stopped

# No local postgres volume needed — using Neon serverless
